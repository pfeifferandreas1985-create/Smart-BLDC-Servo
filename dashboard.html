<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart BLDC Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e2e;
            --text-main: #cdd6f4;
            --text-sub: #a6adc8;
            --accent: #89b4fa;
            --accent-glow: rgba(137, 180, 250, 0.3);
            --danger: #f38ba8;
            --danger-glow: rgba(243, 139, 168, 0.3);
            --success: #a6e3a1;

            /* Neumorphism Shadows for Dark Mode */
            --shadow-out: 8px 8px 16px rgba(17, 17, 27, 0.6), -8px -8px 16px rgba(49, 50, 68, 0.3);
            --shadow-in: inset 6px 6px 10px 0 rgba(17, 17, 27, 0.6), inset -6px -6px 10px 0 rgba(49, 50, 68, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem;
        }

        .header { margin-bottom: 3rem; text-align: center; }
        .header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; color: var(--text-main); }
        .status { margin-top: 10px; font-weight: 600; font-size: 0.9rem; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--bg);
            border-radius: 30px;
            padding: 3rem 2rem;
            box-shadow: var(--shadow-out);
            position: relative;
        }

        .card h2 { font-size: 1rem; color: var(--text-sub); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2rem; text-align: center; }

        /* TELEMETRIE TACHOS */
        .gauges { display: flex; justify-content: space-around; align-items: center; }
        .gauge { text-align: center; display: flex; flex-direction: column; align-items: center; }

        .gauge-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: var(--bg);
            box-shadow: var(--shadow-in);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 1rem;
            border: 4px solid var(--bg);
        }

        .gauge-value { font-size: 2.5rem; font-weight: 800; color: var(--accent); line-height: 1; }
        .gauge-label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); margin-top: 5px; }

        /* SLIDERS */
        .slider-container { margin-bottom: 2rem; margin-top: 2rem; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; color: var(--text-sub); margin-bottom: 1.5rem; }

        input[type=range] {
            -webkit-appearance: none; width: 100%; height: 12px; border-radius: 10px;
            background: var(--bg); outline: none; box-shadow: var(--shadow-in);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%;
            background: var(--bg); cursor: pointer; box-shadow: var(--shadow-out);
            border: 3px solid var(--accent); transition: transform 0.1s;
        }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.1); background: var(--accent); }

        /* MODE BUTTONS */
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 2rem; background: var(--bg); padding: 5px; border-radius: 20px; box-shadow: var(--shadow-in); }
        .mode-btn {
            background: transparent; border: none; color: var(--text-sub);
            padding: 1rem; width: 100%; border-radius: 15px; cursor: pointer; font-weight: 600;
            transition: all 0.3s;
        }
        .mode-btn.active {
            color: var(--bg);
            background: var(--accent);
            box-shadow: var(--shadow-out);
        }

        /* CONNECT BUTTON */
        .connect-switch {
            grid-column: 1 / -1; width: 100%; padding: 1.5rem; margin-bottom: 2rem;
            background: var(--bg); border: none; color: var(--accent);
            font-size: 1.2rem; font-weight: 800; letter-spacing: 2px;
            border-radius: 20px; cursor: pointer;
            box-shadow: var(--shadow-out); transition: all 0.2s;
        }
        .connect-switch:active { box-shadow: var(--shadow-in); }
        .connect-switch.connected { color: var(--success); }

    </style>
</head>
<body>

    <button id="btn-connect" class="connect-switch" onclick="connectSerial()">USB PORT ZUWEISEN & VERBINDEN</button>

    <div class="header">
        <h1>Smart BLDC Servo<br>Control Center</h1>
        <div class="status">
            <div class="dot" id="conn-dot"></div>
            <span id="conn-text">Nicht verbunden (Web Serial API)</span>
        </div>
    </div>

    <div class="dashboard-grid">

        <!-- TELEMETRIE -->
        <div class="card">
            <h2>AS5600 Telemetrie</h2>
            <div class="gauges">
                <div class="gauge">
                    <div class="gauge-circle">
                        <div class="gauge-value" id="val-rpm">0</div>
                        <div class="gauge-label">U / min</div>
                    </div>
                </div>
                <div class="gauge">
                    <div class="gauge-circle">
                        <div class="gauge-value"><span id="val-pos">0</span>°</div>
                        <div class="gauge-label">Winkel</div>
                    </div>
                </div>
            </div>
            <div style="text-align:center; color: var(--text-sub); font-size:0.8rem; margin-top:1rem; font-weight:600;">
                Spannung (Motor): <span id="val-volt">0.0</span> V
            </div>
        </div>

        <!-- STEUERUNG -->
        <div class="card">
            <h2>Command Interface</h2>

            <div class="mode-toggle">
                <button class="mode-btn active" id="btn-mode-speed" onclick="setMode('speed')">Drehzahlregelung</button>
                <button class="mode-btn" id="btn-mode-pos" onclick="setMode('pos')">Positionsregelung</button>
            </div>

            <!-- Speed Slider -->
            <div id="slider-wrap-speed" class="slider-container">
                <div class="slider-labels">
                    <span>Rückwärts</span>
                    <span style="color:var(--accent);">Ziel: <span id="lbl-spd">0</span> U/min</span>
                    <span>Vorwärts</span>
                </div>
                <input type="range" id="slider-speed" min="-1000" max="1000" value="0" step="10"
                       oninput="updateValue('speed', this.value)" onmouseup="snapToZero('speed')">
            </div>

            <!-- Position Slider -->
            <div id="slider-wrap-pos" class="slider-container" style="display:none;">
                <div class="slider-labels">
                    <span>-360°</span>
                    <span style="color:var(--accent);">Ziel: <span id="lbl-pos">0</span>°</span>
                    <span>+360°</span>
                </div>
                <input type="range" id="slider-pos" min="-360" max="360" value="0" step="1"
                       oninput="updateValue('pos', this.value)">
            </div>
            
            <div style="text-align:center; margin-top: 2rem;">
                <button onclick="sendCmd({cmd: 'zero'})" style="background:var(--bg); border:none; color:var(--text-sub); padding:10px 20px; border-radius:10px; box-shadow:var(--shadow-out); cursor:pointer; font-weight:bold;">AS5600 NULLPUNKT SETZEN</button>
            </div>
        </div>
    </div>

    <script>
        let port;
        let reader;
        let writer;
        let isConnected = false;
        let controlMode = 'speed';

        async function connectSerial() {
            if (isConnected) {
                // Disconnect
                try {
                    reader.cancel();
                    await port.close();
                } catch(e) {}
                isConnected = false;
                updateUI();
                return;
            }

            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                isConnected = true;
                updateUI();

                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                reader = textDecoder.readable.getReader();

                const textEncoder = new TextEncoderStream();
                const writableStreamClosed = textEncoder.readable.pipeTo(port.writable);
                writer = textEncoder.writable.getWriter();

                readLoop();
            } catch (error) {
                console.error("Connection error:", error);
                alert("Verbindung fehlgeschlagen: " + error);
            }
        }

        function updateUI() {
            const btn = document.getElementById('btn-connect');
            const dot = document.getElementById('conn-dot');
            const txt = document.getElementById('conn-text');

            if (isConnected) {
                btn.innerText = "TRENNEN";
                btn.classList.add('connected');
                dot.classList.add('active');
                txt.innerText = "Verbunden (Serial USB)";
                dot.style.background = "var(--success)";
                dot.style.boxShadow = "0 0 10px var(--success)";
            } else {
                btn.innerText = "USB PORT ZUWEISEN & VERBINDEN";
                btn.classList.remove('connected');
                dot.classList.remove('active');
                txt.innerText = "Nicht verbunden";
                dot.style.background = "var(--danger)";
                dot.style.boxShadow = "0 0 10px var(--danger)";
            }
        }

        async function readLoop() {
            let buffer = "";
            while (true) {
                try {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); // keep the last incomplete line

                    for (let line of lines) {
                        try {
                            // Erwartetes JSON Format: {"pos": 180.5, "rpm": 1200, "volt": 5.4}
                            let data = JSON.parse(line.trim());
                            if(data.pos !== undefined) document.getElementById('val-pos').innerText = data.pos.toFixed(1);
                            if(data.rpm !== undefined) document.getElementById('val-rpm').innerText = data.rpm.toFixed(0);
                            if(data.volt !== undefined) document.getElementById('val-volt').innerText = data.volt.toFixed(2);
                        } catch(e) {
                            // Ignoriere nicht-JSON Zeilen (z.B. Boot-Logs)
                        }
                    }
                } catch (error) {
                    break;
                }
            }
            isConnected = false;
            updateUI();
        }

        async function sendCmd(jsonObj) {
            if (isConnected && writer) {
                const cmdString = JSON.stringify(jsonObj) + "\n";
                await writer.write(cmdString);
            }
        }

        function setMode(mode) {
            controlMode = mode;
            document.getElementById('btn-mode-speed').classList.remove('active');
            document.getElementById('btn-mode-pos').classList.remove('active');
            document.getElementById('btn-mode-' + mode).classList.add('active');

            if (mode === 'speed') {
                document.getElementById('slider-wrap-pos').style.display   = 'none';
                document.getElementById('slider-wrap-speed').style.display = 'block';
                document.getElementById('slider-speed').value = 0;
                document.getElementById('lbl-spd').innerText  = 0;
                sendCmd({mode: 'speed', val: 0});
            } else {
                document.getElementById('slider-wrap-speed').style.display = 'none';
                document.getElementById('slider-wrap-pos').style.display   = 'block';
                sendCmd({mode: 'pos', val: parseFloat(document.getElementById('slider-pos').value)});
            }
        }

        function updateValue(mode, val) {
            if (mode === 'speed') { document.getElementById('lbl-spd').innerText = val; sendCmd({mode: 'speed', val: parseFloat(val)}); }
            if (mode === 'pos')   { document.getElementById('lbl-pos').innerText = val; sendCmd({mode: 'pos',   val: parseFloat(val)}); }
        }

        function snapToZero(mode) {
            if (mode === 'speed') { document.getElementById('slider-speed').value = 0; updateValue('speed', 0); }
        }
    </script>
</body>
</html>
